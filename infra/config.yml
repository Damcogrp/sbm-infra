# ============================================================
# config.yml — Single Source of Truth
# ============================================================
# This is the ONLY file the client/team needs to change.
# All workflows, param files, and resource names are driven
# from values defined here. Do not edit any other file.
# ============================================================

# ── Project Identity ─────────────────────────────────────────
project:
  name: sbm
  client_name: seaboard-marine
  owner_team: damco-infra-team
  managed_by: damco
  apim_publisher_email: infra@damcogroup.com
  apim_publisher_name: Damco Solutions

# ── Alert Configuration ───────────────────────────────────────
alerts:
  enabled: true
  email_receivers:
    - name: himanshu
      email: himanshua1@damcogroup.com
    - name: mrugesh
      email: mrugesh@damcogroup.com
  cpu_threshold_percent: 80
  memory_threshold_percent: 85
  sql_dtu_threshold_percent: 80
  redis_memory_threshold_percent: 80

# ── Environment Configuration ────────────────────────────────
environments:

  dev:
    location: centralindia
    region_short: cin

    # Feature Flags
    deploy_app_gateway: false
    deploy_apim: false
    deploy_nat_gateway: true
    deploy_scheduler: true
    deploy_ddos_protection: false  # DDoS Standard ~$2944/month — keep false for dev
    deploy_dr: false               # Disaster Recovery — keep false for dev

    # Disaster Recovery config (only used if deploy_dr: true)
    dr:
      secondary_location: southindia
      secondary_region_short: sin
      sql_failover: false
      traffic_manager: false

    # Network — tighter IP schema for dev
    network:
      vnet_prefix: 10.0.0.0/24
      app_subnet: 10.0.0.0/27
      data_subnet: 10.0.0.32/27
      gw_subnet: 10.0.0.64/27

    # Compute
    app_service:
      sku: B1
      tier: Basic

    # Database
    sql:
      admin_login: sbmadmin
      database_sku: S1

    # Cache
    redis:
      sku: Standard
      family: C
      capacity: 1

    # Event Hub
    eventhub:
      throughput_units: 1
      partition_count: 2
      retention_days: 7

    # Storage
    storage:
      sku: Standard_LRS

    # Monitoring
    monitoring:
      log_retention_days: 30

    # Key Vault
    keyvault:
      secret_expiry_days: 45
      soft_delete_retention_days: 7

  uat:
    # ── UAT runs on Damco Azure ───────────────────────────────
    # Same as dev but slightly higher specs for client testing
    location: centralindia
    region_short: cin

    # Feature Flags — UAT has AppGW + APIM for realistic testing
    deploy_app_gateway: false      # Keep false unless client needs WAF in UAT
    deploy_apim: false             # Keep false unless client needs APIM in UAT
    deploy_nat_gateway: true
    deploy_scheduler: true
    deploy_ddos_protection: false  # DDoS Standard — keep false for UAT
    deploy_dr: false               # DR — not needed for UAT

    # Disaster Recovery config
    dr:
      secondary_location: southindia
      secondary_region_short: sin
      sql_failover: false
      traffic_manager: false

    # Network — different IP range from dev to avoid clash
    network:
      vnet_prefix: 10.1.0.0/24
      app_subnet: 10.1.0.0/27
      data_subnet: 10.1.0.32/27
      gw_subnet: 10.1.0.64/27

    # Compute — slightly higher than dev for realistic load testing
    app_service:
      sku: B2
      tier: Basic

    # Database
    sql:
      admin_login: sbmadmin
      database_sku: S1

    # Cache
    redis:
      sku: Standard
      family: C
      capacity: 1

    # Event Hub
    eventhub:
      throughput_units: 1
      partition_count: 2
      retention_days: 7

    # Storage
    storage:
      sku: Standard_LRS

    # Monitoring
    monitoring:
      log_retention_days: 30

    # Key Vault
    keyvault:
      secret_expiry_days: 45
      soft_delete_retention_days: 7

  qa:
    # ── QA runs on Client Azure ───────────────────────────────
    location: centralindia         # TODO: update to client's preferred region
    region_short: cin              # TODO: update to match location above

    # Feature Flags
    deploy_app_gateway: true
    deploy_apim: true
    deploy_nat_gateway: true
    deploy_scheduler: true

    # Network
    network:
      vnet_prefix: 10.3.0.0/23
      app_subnet: 10.3.0.0/26
      data_subnet: 10.3.0.64/26
      gw_subnet: 10.3.0.128/26

    # Compute
    app_service:
      sku: P1v3
      tier: PremiumV3

    # Database
    sql:
      admin_login: sbmadmin
      database_sku: S2

    # Cache
    redis:
      sku: Standard
      family: C
      capacity: 2

    # Event Hub
    eventhub:
      throughput_units: 2
      partition_count: 4
      retention_days: 7

    # Storage
    storage:
      sku: Standard_GRS

    # Monitoring
    monitoring:
      log_retention_days: 60

    # Key Vault
    keyvault:
      secret_expiry_days: 45
      soft_delete_retention_days: 30

  prod:
    # ── PROD runs on Client Azure ─────────────────────────────
    location: centralindia         # TODO: update to client's preferred region
    region_short: cin              # TODO: update to match location above

    # Feature Flags
    deploy_app_gateway: true
    deploy_apim: true
    deploy_nat_gateway: true
    deploy_scheduler: true

    # Network
    network:
      vnet_prefix: 10.5.0.0/23
      app_subnet: 10.5.0.0/26
      data_subnet: 10.5.0.64/26
      gw_subnet: 10.5.0.128/26

    # Compute
    app_service:
      sku: P2v3
      tier: PremiumV3

    # Database
    sql:
      admin_login: sbmadmin
      database_sku: S3

    # Cache
    redis:
      sku: Standard
      family: C
      capacity: 2

    # Event Hub
    eventhub:
      throughput_units: 2
      partition_count: 4
      retention_days: 7

    # Storage
    storage:
      sku: Standard_GRS

    # Monitoring
    monitoring:
      log_retention_days: 90

    # Key Vault
    keyvault:
      secret_expiry_days: 45
      soft_delete_retention_days: 90
