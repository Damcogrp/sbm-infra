# ============================================================
# config.yml — Single Source of Truth
# ============================================================
# This is the ONLY file the client needs to change.
# All workflows, param files, and resource names are driven
# from values defined here. Do not edit any other file.
# ============================================================

# ── Project Identity ─────────────────────────────────────────
project:
  name: sbm
  client_name: seaboard-marine
  owner_team: damco-infra-team
  managed_by: damco
  apim_publisher_email: infra@damcogroup.com
  apim_publisher_name: Damco Solutions

# ── Alert Configuration ───────────────────────────────────────
# Point 2: Default alerts enabled — add email(s) to receive alerts
alerts:
  enabled: true
  email_receivers:
    - name: himanshu
      email: himanshua1@damcogroup.com    # ← change/add emails here
    - name: mrugesh
      email: mrugesh@damcogroup.com
  # Alert thresholds
  cpu_threshold_percent: 80              # Alert when CPU > 80%
  memory_threshold_percent: 85           # Alert when memory > 85%
  http_5xx_threshold: 10                 # Alert when 5xx errors > 10 per min
  sql_dtu_threshold_percent: 80          # Alert when SQL DTU > 80%
  redis_memory_threshold_percent: 80     # Alert when Redis memory > 80%

# ── Environment Configuration ────────────────────────────────
environments:

  dev:
    location: centralindia
    region_short: cin

    # Feature Flags
    deploy_app_gateway: false
    deploy_apim: false
    deploy_nat_gateway: true
    deploy_scheduler: true             # Point 1: Azure Logic App scheduler (separate from Function App)

    # Point 3: Tighter IP schema for dev (fewer addresses)
    # /28 = 16 addresses, /27 = 32 addresses (sufficient for App Service)
    network:
      vnet_prefix: 10.0.0.0/24        # /24 = 256 total (was /16 = 65536 — way too wide)
      app_subnet: 10.0.0.0/27         # /27 = 32 addresses — enough for app services
      data_subnet: 10.0.0.32/27       # /27 = 32 addresses — enough for data services
      gw_subnet: 10.0.0.64/27         # /27 = 32 addresses — only if AppGW needed

    # Compute
    app_service:
      sku: B1
      tier: Basic

    # Database
    sql:
      admin_login: sbmadmin
      database_sku: S1

    # Cache
    redis:
      sku: Standard
      family: C
      capacity: 1

    # Event Hub
    eventhub:
      throughput_units: 1
      partition_count: 2
      retention_days: 7

    # Storage
    storage:
      sku: Standard_LRS

    # Monitoring
    monitoring:
      log_retention_days: 30

    # Point 4: Key Vault secret expiration
    keyvault:
      secret_expiry_days: 45           # Secrets expire after 45 days
      soft_delete_retention_days: 7    # Shorter retention for dev (was 90)

  qa:
    location: centralindia
    region_short: cin

    # Feature Flags
    deploy_app_gateway: true
    deploy_apim: true
    deploy_nat_gateway: true
    deploy_scheduler: true

    # Point 3: QA uses slightly wider range (more services)
    network:
      vnet_prefix: 10.3.0.0/23        # /23 = 512 total addresses
      app_subnet: 10.3.0.0/26         # /26 = 64 addresses
      data_subnet: 10.3.0.64/26       # /26 = 64 addresses
      gw_subnet: 10.3.0.128/26        # /26 = 64 addresses (App Gateway needs room)

    app_service:
      sku: P1v3
      tier: PremiumV3

    sql:
      admin_login: sbmadmin
      database_sku: S2

    redis:
      sku: Standard
      family: C
      capacity: 2

    eventhub:
      throughput_units: 2
      partition_count: 4
      retention_days: 7

    storage:
      sku: Standard_GRS

    monitoring:
      log_retention_days: 60

    keyvault:
      secret_expiry_days: 45
      soft_delete_retention_days: 30

  prod:
    location: centralindia
    region_short: cin

    # Feature Flags
    deploy_app_gateway: true
    deploy_apim: true
    deploy_nat_gateway: true
    deploy_scheduler: true

    network:
      vnet_prefix: 10.5.0.0/23
      app_subnet: 10.5.0.0/26
      data_subnet: 10.5.0.64/26
      gw_subnet: 10.5.0.128/26

    app_service:
      sku: P2v3
      tier: PremiumV3

    sql:
      admin_login: sbmadmin
      database_sku: S3

    redis:
      sku: Standard
      family: C
      capacity: 2

    eventhub:
      throughput_units: 2
      partition_count: 4
      retention_days: 7

    storage:
      sku: Standard_GRS

    monitoring:
      log_retention_days: 90

    keyvault:
      secret_expiry_days: 45
      soft_delete_retention_days: 90
