# ============================================================
# config.yml — Single Source of Truth
# ============================================================
# This is the ONLY file the client needs to change.
# All workflows, param files, and resource names are driven
# from values defined here. Do not edit any other file.
# ============================================================

# ── Project Identity ─────────────────────────────────────────
project:
  name: sbm                        # Short project code (2-6 chars). Used in ALL resource names.
  client_name: seaboard-marine     # Full client name. Used in tags.
  owner_team: damco-infra-team     # Team responsible for infra. Used in tags.
  managed_by: damco                # Who manages this infra. Used in tags.
  apim_publisher_email: infra@damcogroup.com
  apim_publisher_name: Damco Solutions

# ── Environment Configuration ────────────────────────────────
environments:

  dev:
    # Azure Region
    location: centralindia
    region_short: cin

    # ── Feature Flags ─────────────────────────────────────────
    # Set true/false to enable or disable any Azure service.
    # Run pipeline after changing — only changed services are affected.

    # Networking
    deploy_vnet: true              # VNet + NSGs + Subnets. Keep true always.
    deploy_nat_gateway: true       # NAT Gateway — static outbound IP for on-prem DB2.

    # Compute
    deploy_app_service: true       # App Services (FE + BE + Function). Core service.

    # Data
    deploy_sql: false              # Azure SQL Server + Database. Set false to skip initially.
    deploy_redis: true             # Azure Redis Cache. In-memory caching layer.
    deploy_eventhub: true          # Azure Event Hubs. Async messaging.
    deploy_storage: true           # Azure Blob Storage. Files, reports, web data.

    # Security & Observability
    deploy_keyvault: true          # Azure Key Vault. Secrets, certs, keys.
    deploy_monitoring: true        # Log Analytics + App Insights. Always recommended.

    # QA/Prod only services
    deploy_app_gateway: false      # Application Gateway (WAF v2). Keep false for dev.
    deploy_apim: false             # Azure API Management. Keep false for dev.

    # ── Network ───────────────────────────────────────────────
    network:
      vnet_prefix: 10.0.0.0/16
      app_subnet: 10.0.1.0/24
      data_subnet: 10.0.2.0/24
      gw_subnet: 10.0.3.0/24

    # ── Compute ───────────────────────────────────────────────
    app_service:
      sku: B2
      tier: Basic

    # ── Database (used only if deploy_sql = true) ─────────────
    sql:
      admin_login: sbmadmin
      database_sku: S1

    # ── Cache (used only if deploy_redis = true) ──────────────
    redis:
      sku: Standard
      family: C
      capacity: 1

    # ── Event Hub (used only if deploy_eventhub = true) ───────
    eventhub:
      throughput_units: 1
      partition_count: 2
      retention_days: 7

    # ── Storage (used only if deploy_storage = true) ──────────
    storage:
      sku: Standard_LRS

    # ── Monitoring (used only if deploy_monitoring = true) ────
    monitoring:
      log_retention_days: 30

  qa:
    # Azure Region
    location: centralindia         # TODO: update to client's preferred region
    region_short: cin              # TODO: update to match location above

    # ── Feature Flags ─────────────────────────────────────────
    deploy_vnet: true
    deploy_nat_gateway: true
    deploy_app_service: true
    deploy_sql: true               # Enable SQL for QA
    deploy_redis: true
    deploy_eventhub: true
    deploy_storage: true
    deploy_keyvault: true
    deploy_monitoring: true
    deploy_app_gateway: true       # Enable App Gateway for QA
    deploy_apim: true              # Enable APIM for QA

    # ── Network ───────────────────────────────────────────────
    network:
      vnet_prefix: 10.3.0.0/16    # TODO: confirm with client this range is free
      app_subnet: 10.3.1.0/24
      data_subnet: 10.3.2.0/24
      gw_subnet: 10.3.3.0/24

    # ── Compute ───────────────────────────────────────────────
    app_service:
      sku: P1v3
      tier: PremiumV3

    # ── Database ──────────────────────────────────────────────
    sql:
      admin_login: sbmadmin
      database_sku: S2

    # ── Cache ─────────────────────────────────────────────────
    redis:
      sku: Standard
      family: C
      capacity: 2

    # ── Event Hub ─────────────────────────────────────────────
    eventhub:
      throughput_units: 2
      partition_count: 4
      retention_days: 7

    # ── Storage ───────────────────────────────────────────────
    storage:
      sku: Standard_GRS

    # ── Monitoring ────────────────────────────────────────────
    monitoring:
      log_retention_days: 60

  prod:
    # Azure Region
    location: centralindia         # TODO: update to client's preferred region
    region_short: cin              # TODO: update to match location above

    # ── Feature Flags ─────────────────────────────────────────
    deploy_vnet: true
    deploy_nat_gateway: true
    deploy_app_service: true
    deploy_sql: true
    deploy_redis: true
    deploy_eventhub: true
    deploy_storage: true
    deploy_keyvault: true
    deploy_monitoring: true
    deploy_app_gateway: true
    deploy_apim: true

    # ── Network ───────────────────────────────────────────────
    network:
      vnet_prefix: 10.5.0.0/16    # TODO: confirm with client this range is free
      app_subnet: 10.5.1.0/24
      data_subnet: 10.5.2.0/24
      gw_subnet: 10.5.3.0/24

    # ── Compute ───────────────────────────────────────────────
    app_service:
      sku: P2v3
      tier: PremiumV3

    # ── Database ──────────────────────────────────────────────
    sql:
      admin_login: sbmadmin
      database_sku: S3

    # ── Cache ─────────────────────────────────────────────────
    redis:
      sku: Standard
      family: C
      capacity: 2

    # ── Event Hub ─────────────────────────────────────────────
    eventhub:
      throughput_units: 2
      partition_count: 4
      retention_days: 7

    # ── Storage ───────────────────────────────────────────────
    storage:
      sku: Standard_GRS

    # ── Monitoring ────────────────────────────────────────────
    monitoring:
      log_retention_days: 90
