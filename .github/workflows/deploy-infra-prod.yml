# ============================================================
# deploy-infra-prod.yml — PROD Environment (Client Azure)
# Trigger: Manual only — Production deployments are always manual
# Auth:    OIDC Federated Identity (Client prod subscription)
#
# BEFORE FIRST RUN — Add these GitHub secrets:
#   AZURE_CLIENT_ID_PROD       → from client's prod app registration
#   AZURE_TENANT_ID_PROD       → client's Azure tenant ID
#   AZURE_SUBSCRIPTION_ID_PROD → client's prod subscription ID
#   SQL_ADMIN_PASSWORD_PROD    → strong password for Prod SQL
#
# BEFORE FIRST RUN — Create GitHub Environment:
#   Name: prod
#   Required reviewers: himanshua121 + Mrugesh + client approver
#   Wait timer: 5 minutes (cooling off period)
# ============================================================

name: SBM Infra — Prod Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm PRODUCTION deployment'
        required: true
        type: string
      change_ticket:
        description: 'Change ticket / approval reference number'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT:    prod
  LOCATION:       centralindia
  REGION_SHORT:   cin
  PROJECT_NAME:   sbm
  RESOURCE_GROUP: rg-sbm-prod-cin
  BICEP_MAIN:     infra/main.bicep
  PARAM_FILE:     infra/parameters/prod.bicepparam

jobs:
  # ── Guard ────────────────────────────────────────────────────
  confirm:
    name: Confirm PROD deployment
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-prod" ]; then
            echo "ERROR: Must type 'deploy-prod' to confirm. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi
          echo "Change ticket: ${{ github.event.inputs.change_ticket }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Confirmed. Proceeding with PRODUCTION deployment."

  # ── Validate ─────────────────────────────────────────────────
  validate:
    name: What-If Preview (Client PROD)
    runs-on: ubuntu-latest
    needs: confirm
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login — Client PROD (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Install Bicep CLI
        run: az bicep install && az bicep version

      - name: Bicep Lint
        run: |
          az bicep lint --file ${{ env.BICEP_MAIN }}
          echo "Lint passed."

      - name: What-If Preview
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=${{ env.ENVIRONMENT }} \
                   Owner=damco-infra-team ManagedBy=damco \
                   Client=seaboard-marine DeployedBy=github-actions 2>/dev/null || true

          echo "Running What-If on CLIENT PROD subscription..."
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters ${{ env.PARAM_FILE }} \
            --parameters sqlAdminPassword='placeholder-whatif' \
            --result-format FullResourcePayloads

  # ── Deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy to rg-sbm-prod-cin (Client PROD subscription)
    runs-on: ubuntu-latest
    needs: validate
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login — Client PROD (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Install Bicep CLI
        run: az bicep install && az bicep version

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=${{ env.ENVIRONMENT }} \
                   Owner=damco-infra-team ManagedBy=damco \
                   Client=seaboard-marine DeployedBy=github-actions \
                   ChangeTicket=${{ github.event.inputs.change_ticket }} \
                   BuildId=${{ github.run_id }}

      - name: Deploy Bicep
        run: |
          echo "Starting PRODUCTION deployment to client subscription..."
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters ${{ env.PARAM_FILE }} \
            --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD_PROD }}' \
            --name "deploy-sbm-prod-${{ github.run_id }}" \
            --mode Incremental
          echo "PRODUCTION Deployment complete."

      - name: Print Deployment Outputs (incl. Static IP)
        run: |
          echo "=== PROD Deployment Outputs ==="
          az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "deploy-sbm-prod-${{ github.run_id }}" \
            --query properties.outputs \
            -o table
          echo ""
          echo "IMPORTANT: Share the 'staticOutboundIp' and 'appGatewayPublicIp' with the client for firewall whitelisting."

      - name: Smoke Test
        run: |
          echo "Running PROD smoke tests..."
          PASS=0; FAIL=0
          BASE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-${{ env.REGION_SHORT }}"

          check() {
            RESULT=$(az resource list --resource-group ${{ env.RESOURCE_GROUP }} \
              --resource-type "$2" --query "[?name=='$1'].name" -o tsv)
            if [ -z "$RESULT" ]; then echo "  FAIL: $1"; FAIL=$((FAIL+1))
            else echo "  PASS: $1"; PASS=$((PASS+1)); fi
          }

          check "vnet-${BASE}"     "Microsoft.Network/virtualNetworks"
          check "kv-${BASE}"       "Microsoft.KeyVault/vaults"
          check "asp-${BASE}"      "Microsoft.Web/serverfarms"
          check "app-${BASE}-fe"   "Microsoft.Web/sites"
          check "app-${BASE}-be"   "Microsoft.Web/sites"
          check "func-${BASE}-evb" "Microsoft.Web/sites"
          check "sql-${BASE}"      "Microsoft.Sql/servers"
          check "redis-${BASE}"    "Microsoft.Cache/redis"
          check "evhns-${BASE}"    "Microsoft.EventHub/namespaces"
          check "agw-${BASE}"      "Microsoft.Network/applicationGateways"
          check "apim-${BASE}"     "Microsoft.ApiManagement/service"
          check "natgw-${BASE}"    "Microsoft.Network/natGateways"

          echo "Results: $PASS passed, $FAIL failed"
          [ $FAIL -gt 0 ] && echo "PROD smoke tests FAILED — investigate immediately." && exit 1
          echo "All PROD smoke tests passed."
