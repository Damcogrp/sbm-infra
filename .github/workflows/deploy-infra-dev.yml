# ============================================================
# deploy-infra-dev.yml — DEV Environment (Damco Azure)
# All config values are read from infra/config.yml
# NO hardcoded values — client never needs to edit this file
# ============================================================

name: SBM Infra — Dev Deploy

on:
  push:
    branches: [ main ]
    paths: [ 'infra/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'infra/**' ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ── Job 1: Load config from config.yml ──────────────────────
  load-config:
    name: Load config.yml
    runs-on: ubuntu-latest
    outputs:
      project_name:   ${{ steps.cfg.outputs.project_name }}
      location:       ${{ steps.cfg.outputs.location }}
      region_short:   ${{ steps.cfg.outputs.region_short }}
      resource_group: ${{ steps.cfg.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read config.yml
        id: cfg
        run: |
          PROJECT=$(yq '.project.name' infra/config.yml)
          LOCATION=$(yq '.environments.dev.location' infra/config.yml)
          REGION=$(yq '.environments.dev.region_short' infra/config.yml)
          RG="rg-${PROJECT}-dev-${REGION}"

          echo "project_name=$PROJECT"   >> $GITHUB_OUTPUT
          echo "location=$LOCATION"      >> $GITHUB_OUTPUT
          echo "region_short=$REGION"    >> $GITHUB_OUTPUT
          echo "resource_group=$RG"      >> $GITHUB_OUTPUT

          echo "✅ Project:        $PROJECT"
          echo "✅ Location:       $LOCATION"
          echo "✅ Region Short:   $REGION"
          echo "✅ Resource Group: $RG"

  # ── Job 2: Bicep Lint + What-If (PR only) ───────────────────
  validate:
    name: Bicep Lint and What-If Preview
    runs-on: ubuntu-latest
    needs: load-config
    if: github.event_name == 'pull_request'
    env:
      PROJECT_NAME:   ${{ needs.load-config.outputs.project_name }}
      LOCATION:       ${{ needs.load-config.outputs.location }}
      REGION_SHORT:   ${{ needs.load-config.outputs.region_short }}
      RESOURCE_GROUP: ${{ needs.load-config.outputs.resource_group }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install && az bicep version

      - name: Bicep Lint
        run: |
          az bicep lint --file infra/main.bicep
          echo "Lint passed."

      - name: Bicep Build
        run: |
          az bicep build --file infra/main.bicep --outfile compiled-arm.json
          echo "Bicep compiled successfully."

      - name: What-If Preview
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=dev \
                   ManagedBy=damco DeployedBy=github-actions 2>/dev/null || true

          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters sqlAdminPassword='placeholder-whatif' \
            --result-format FullResourcePayloads

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Bicep lint passed** and **What-If analysis completed** successfully.\n\nPlease review the What-If output in the Actions logs before approving this PR.'
            })

      - name: Upload compiled ARM
        uses: actions/upload-artifact@v4
        with:
          name: arm-compiled-${{ github.run_id }}
          path: compiled-arm.json

  # ── Job 3: Deploy to Dev (merge to main only) ────────────────
  deploy:
    name: Deploy to Dev (Damco Azure)
    runs-on: ubuntu-latest
    needs: load-config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    env:
      PROJECT_NAME:   ${{ needs.load-config.outputs.project_name }}
      LOCATION:       ${{ needs.load-config.outputs.location }}
      REGION_SHORT:   ${{ needs.load-config.outputs.region_short }}
      RESOURCE_GROUP: ${{ needs.load-config.outputs.resource_group }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install && az bicep version

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=dev \
                   ManagedBy=damco DeployedBy=github-actions BuildId=${{ github.run_id }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD }}' \
            --name "deploy-${{ env.PROJECT_NAME }}-dev-${{ github.run_id }}" \
            --mode Incremental
          echo "Deployment complete."

      - name: Print Outputs
        run: |
          az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "deploy-${{ env.PROJECT_NAME }}-dev-${{ github.run_id }}" \
            --query properties.outputs -o table

      - name: Smoke Test
        run: |
          PASS=0; FAIL=0
          BASE="${{ env.PROJECT_NAME }}-dev-${{ env.REGION_SHORT }}"
          RG="${{ env.RESOURCE_GROUP }}"

          check() {
            RESULT=$(az resource list --resource-group $RG \
              --resource-type "$2" --query "[?name=='$1'].name" -o tsv)
            if [ -z "$RESULT" ]; then echo "  FAIL: $1"; FAIL=$((FAIL+1))
            else echo "  PASS: $1"; PASS=$((PASS+1)); fi
          }

          check "vnet-${BASE}"     "Microsoft.Network/virtualNetworks"
          check "kv-${BASE}"       "Microsoft.KeyVault/vaults"
          check "asp-${BASE}"      "Microsoft.Web/serverfarms"
          check "app-${BASE}-fe"   "Microsoft.Web/sites"
          check "app-${BASE}-be"   "Microsoft.Web/sites"
          check "func-${BASE}-evb" "Microsoft.Web/sites"
          check "sql-${BASE}"      "Microsoft.Sql/servers"
          check "redis-${BASE}"    "Microsoft.Cache/redis"
          check "evhns-${BASE}"    "Microsoft.EventHub/namespaces"

          echo "Results: $PASS passed, $FAIL failed"
          [ $FAIL -gt 0 ] && exit 1
          echo "All smoke tests passed."
