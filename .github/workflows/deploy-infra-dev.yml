# ============================================================
# deploy-infra-dev.yml — SBM Infrastructure GitHub Actions Pipeline
# Repo:        SeaboardMarine-Infra (Damcogrp)
# Trigger:     PR validation on every PR to main
#              Deploy on merge to main only
# Auth:        Workload Identity Federation (no secrets)
# Naming:      Microsoft CAF standard
# Tagging:     Damco enterprise standard
# ============================================================

name: SBM Infra — Dev Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AZURE_SUBSCRIPTION_ID: '7110ec71-4118-4bf0-90cd-62338b906c8b'
  AZURE_RESOURCE_GROUP:  'rg-sbm-dev-cin'
  AZURE_LOCATION:        'centralindia'
  BICEP_MAIN:            'infra/main.bicep'
  BICEP_PARAMS:          'infra/parameters/dev.bicepparam'
  DEPLOYMENT_NAME:       'gh-sbm-infra-dev'

jobs:

# ============================================================
# JOB 1 — PR Validation (runs on every PR — lint + what-if)
# ============================================================
  validate:
    name: 'Bicep Lint and What-If Preview'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login — Workload Identity Federation
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Bicep Lint — check for errors and warnings
        run: |
          echo "Running Bicep lint..."
          az bicep lint --file ${{ env.BICEP_MAIN }}
          echo "Lint passed."

      - name: Bicep Build — compile to ARM (dry run)
        run: |
          az bicep build --file ${{ env.BICEP_MAIN }} --outfile compiled-arm.json
          echo "Bicep compiled successfully."

      - name: Create Resource Group if not exists
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags Project=sbm Environment=dev Owner=damco-infra-team \
                   ManagedBy=damco Client=seaboard-marine \
                   CostCenter=sbm-dev-2026 DeployedBy=github-actions \
            2>/dev/null || true

      - name: What-If — preview all resource changes
        run: |
          echo "Running What-If analysis..."
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file  ${{ env.BICEP_MAIN }} \
            --parameters     ${{ env.BICEP_PARAMS }} \
            --parameters     environment=dev \
                             projectName=sbm \
                             regionShort=cin \
                             sqlAdminPassword='placeholder-whatif' \
            --result-format  FullResourcePayloads

      - name: Upload compiled ARM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: arm-compiled-${{ github.run_id }}
          path: compiled-arm.json

      - name: Comment What-If result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Bicep lint passed** and **What-If analysis completed** successfully.\n\nPlease review the What-If output in the Actions logs before approving this PR.'
            })

# ============================================================
# JOB 2 — Deploy (runs only on merge to main OR manual trigger)
# ============================================================
  deploy:
    name: 'Deploy to rg-sbm-dev-cin (Damco subscription)'
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login — Workload Identity Federation
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags Project=sbm Environment=dev \
                   Owner=damco-infra-team ManagedBy=damco \
                   Client=seaboard-marine CostCenter=sbm-dev-2026 \
                   DeployedBy=github-actions BuildId=${{ github.run_id }}
          echo "Resource group ready: ${{ env.AZURE_RESOURCE_GROUP }}"

      - name: Fetch SQL password from Azure Key Vault
        run: |
          SQL_PASSWORD=$(az keyvault secret show \
            --vault-name kv-sbm-pipeline-cin \
            --name sbm-sql-admin-password \
            --query value -o tsv)
          echo "::add-mask::$SQL_PASSWORD"
          echo "SQL_PASSWORD=$SQL_PASSWORD" >> $GITHUB_ENV

      - name: Deploy all Bicep modules
        run: |
          echo "Starting Bicep deployment to ${{ env.AZURE_RESOURCE_GROUP }}..."
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file  ${{ env.BICEP_MAIN }} \
            --parameters     ${{ env.BICEP_PARAMS }} \
            --parameters     environment=dev \
                             projectName=sbm \
                             regionShort=cin \
                             sqlAdminPassword="${{ env.SQL_PASSWORD }}" \
            --name           ${{ env.DEPLOYMENT_NAME }}-${{ github.run_id }} \
            --mode           Incremental
          echo "Deployment complete."

      - name: Print deployment outputs
        run: |
          echo "=== Deployment Outputs ==="
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.DEPLOYMENT_NAME }}-${{ github.run_id }} \
            --query properties.outputs \
            -o table

      - name: Apply Damco tags to all resources
        run: |
          echo "Applying Damco tags to all resources..."
          RESOURCE_IDS=$(az resource list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[].id" -o tsv)
          for id in $RESOURCE_IDS; do
            az tag update \
              --resource-id "$id" \
              --operation merge \
              --tags Project=sbm Environment=dev \
                     Owner=damco-infra-team ManagedBy=damco \
                     Client=seaboard-marine CostCenter=sbm-dev-2026 \
                     DeployedBy=github-actions BuildId=${{ github.run_id }}
          done
          echo "All resources tagged."

      - name: Smoke test — verify all key resources exist
        run: |
          echo "Running smoke tests..."
          PASS=0; FAIL=0
          check() {
            RESULT=$(az resource list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --resource-type "$2" \
              --query "[?name=='$1'].name" -o tsv)
            if [ -z "$RESULT" ]; then
              echo "  FAIL: $1 not found"
              FAIL=$((FAIL+1))
            else
              echo "  PASS: $1"
              PASS=$((PASS+1))
            fi
          }
          check "vnet-sbm-dev-cin"     "Microsoft.Network/virtualNetworks"
          check "kv-sbm-dev-cin"       "Microsoft.KeyVault/vaults"
          check "log-sbm-dev-cin"      "Microsoft.OperationalInsights/workspaces"
          check "asp-sbm-dev-cin"      "Microsoft.Web/serverfarms"
          check "app-sbm-dev-cin-fe"   "Microsoft.Web/sites"
          check "app-sbm-dev-cin-be"   "Microsoft.Web/sites"
          check "func-sbm-dev-cin-evb" "Microsoft.Web/sites"
          check "sql-sbm-dev-cin"      "Microsoft.Sql/servers"
          check "redis-sbm-dev-cin"    "Microsoft.Cache/redis"
          check "evhns-sbm-dev-cin"    "Microsoft.EventHub/namespaces"
          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          if [ $FAIL -gt 0 ]; then
            echo "Smoke tests FAILED."
            exit 1
          fi
          echo "All smoke tests passed."
