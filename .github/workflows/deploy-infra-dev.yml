# ============================================================
# deploy-infra-dev.yml — DEV Environment (Damco Azure)
# Trigger: PR validation + merge to main
# Auth:    OIDC Federated Identity (Damco subscription)
# ============================================================

name: SBM Infra — Dev Deploy

on:
  push:
    branches: [ main ]
    paths: [ 'infra/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'infra/**' ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ENVIRONMENT:    dev
  LOCATION:       centralindia
  REGION_SHORT:   cin
  PROJECT_NAME:   sbm
  RESOURCE_GROUP: rg-sbm-dev-cin
  BICEP_MAIN:     infra/main.bicep
  PARAM_FILE:     infra/parameters/dev.bicepparam

jobs:
  # ── Job 1: Bicep Lint + What-If (runs on every PR) ──────────
  validate:
    name: Bicep Lint and What-If Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Bicep Lint
        run: |
          echo "Running bicep lint..."
          az bicep lint --file ${{ env.BICEP_MAIN }}
          echo "Lint passed."

      - name: Bicep Build (compile check)
        run: |
          az bicep build --file ${{ env.BICEP_MAIN }} --outfile compiled-arm.json
          echo "Bicep compiled successfully."

      - name: What-If Preview
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=${{ env.ENVIRONMENT }} \
                   Owner=damco-infra-team ManagedBy=damco \
                   Client=seaboard-marine DeployedBy=github-actions 2>/dev/null || true

          echo "Running What-If — check output before approving PR..."
          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters ${{ env.PARAM_FILE }} \
            --parameters sqlAdminPassword='placeholder-whatif' \
            --result-format FullResourcePayloads

      - name: Comment What-If result on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Bicep lint passed** and **What-If analysis completed** successfully.\n\nPlease review the What-If output in the Actions logs before approving this PR.'
            })

      - name: Upload compiled ARM
        uses: actions/upload-artifact@v4
        with:
          name: arm-compiled-${{ github.run_id }}
          path: compiled-arm.json

  # ── Job 2: Deploy to Dev (runs only on merge to main) ───────
  deploy:
    name: Deploy to rg-sbm-dev-cin (Damco subscription)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=${{ env.ENVIRONMENT }} \
                   Owner=damco-infra-team ManagedBy=damco \
                   Client=seaboard-marine DeployedBy=github-actions \
                   BuildId=${{ github.run_id }}
          echo "Resource group ready: ${{ env.RESOURCE_GROUP }}"

      - name: Deploy Bicep
        run: |
          echo "Starting deployment to ${{ env.RESOURCE_GROUP }}..."
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_MAIN }} \
            --parameters ${{ env.PARAM_FILE }} \
            --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD }}' \
            --name "deploy-sbm-dev-${{ github.run_id }}" \
            --mode Incremental
          echo "Deployment complete."

      - name: Print Deployment Outputs
        run: |
          echo "=== Deployment Outputs ==="
          az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "deploy-sbm-dev-${{ github.run_id }}" \
            --query properties.outputs \
            -o table

      - name: Smoke Test
        run: |
          echo "Running smoke tests..."
          PASS=0; FAIL=0
          BASE="${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-${{ env.REGION_SHORT }}"

          check() {
            RESULT=$(az resource list --resource-group ${{ env.RESOURCE_GROUP }} \
              --resource-type "$2" --query "[?name=='$1'].name" -o tsv)
            if [ -z "$RESULT" ]; then echo "  FAIL: $1"; FAIL=$((FAIL+1))
            else echo "  PASS: $1"; PASS=$((PASS+1)); fi
          }

          check "vnet-${BASE}"     "Microsoft.Network/virtualNetworks"
          check "kv-${BASE}"       "Microsoft.KeyVault/vaults"
          check "log-${BASE}"      "Microsoft.OperationalInsights/workspaces"
          check "asp-${BASE}"      "Microsoft.Web/serverfarms"
          check "app-${BASE}-fe"   "Microsoft.Web/sites"
          check "app-${BASE}-be"   "Microsoft.Web/sites"
          check "func-${BASE}-evb" "Microsoft.Web/sites"
          check "sql-${BASE}"      "Microsoft.Sql/servers"
          check "redis-${BASE}"    "Microsoft.Cache/redis"
          check "evhns-${BASE}"    "Microsoft.EventHub/namespaces"

          echo "Results: $PASS passed, $FAIL failed"
          [ $FAIL -gt 0 ] && echo "Smoke tests FAILED." && exit 1
          echo "All smoke tests passed."
