# ============================================================
# deploy-infra-qa.yml — QA Environment (Client Azure)
# All config values are read from infra/config.yml
# NO hardcoded values — client never needs to edit this file
# ============================================================

name: SBM Infra — QA Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-qa" to confirm QA deployment'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # ── Job 1: Load config from config.yml ──────────────────────
  load-config:
    name: Load config.yml
    runs-on: ubuntu-latest
    outputs:
      project_name:   ${{ steps.cfg.outputs.project_name }}
      location:       ${{ steps.cfg.outputs.location }}
      region_short:   ${{ steps.cfg.outputs.region_short }}
      resource_group: ${{ steps.cfg.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read config.yml
        id: cfg
        run: |
          PROJECT=$(yq '.project.name' infra/config.yml)
          LOCATION=$(yq '.environments.qa.location' infra/config.yml)
          REGION=$(yq '.environments.qa.region_short' infra/config.yml)
          RG="rg-${PROJECT}-qa-${REGION}"

          echo "project_name=$PROJECT"   >> $GITHUB_OUTPUT
          echo "location=$LOCATION"      >> $GITHUB_OUTPUT
          echo "region_short=$REGION"    >> $GITHUB_OUTPUT
          echo "resource_group=$RG"      >> $GITHUB_OUTPUT

          echo "✅ Project:        $PROJECT"
          echo "✅ Location:       $LOCATION"
          echo "✅ Region Short:   $REGION"
          echo "✅ Resource Group: $RG"

  # ── Job 2: Confirm intent ────────────────────────────────────
  confirm:
    name: Confirm QA deployment
    runs-on: ubuntu-latest
    needs: load-config
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-qa" ]; then
            echo "ERROR: Type 'deploy-qa' to confirm. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi
          echo "Confirmed. Deploying to QA: ${{ needs.load-config.outputs.resource_group }}"

  # ── Job 3: What-If Preview ───────────────────────────────────
  validate:
    name: What-If Preview (Client QA)
    runs-on: ubuntu-latest
    needs: [load-config, confirm]
    environment: qa
    env:
      PROJECT_NAME:   ${{ needs.load-config.outputs.project_name }}
      LOCATION:       ${{ needs.load-config.outputs.location }}
      REGION_SHORT:   ${{ needs.load-config.outputs.region_short }}
      RESOURCE_GROUP: ${{ needs.load-config.outputs.resource_group }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login — Client QA (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID_QA }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID_QA }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_QA }}

      - name: Install Bicep CLI
        run: az bicep install && az bicep version

      - name: Bicep Lint
        run: |
          az bicep lint --file infra/main.bicep
          echo "Lint passed."

      - name: What-If Preview
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=qa \
                   ManagedBy=damco DeployedBy=github-actions 2>/dev/null || true

          az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/qa.bicepparam \
            --parameters sqlAdminPassword='placeholder-whatif' \
            --result-format FullResourcePayloads

  # ── Job 4: Deploy to Client QA ───────────────────────────────
  deploy:
    name: Deploy to QA (Client Azure)
    runs-on: ubuntu-latest
    needs: [load-config, validate]
    environment: qa
    env:
      PROJECT_NAME:   ${{ needs.load-config.outputs.project_name }}
      LOCATION:       ${{ needs.load-config.outputs.location }}
      REGION_SHORT:   ${{ needs.load-config.outputs.region_short }}
      RESOURCE_GROUP: ${{ needs.load-config.outputs.resource_group }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login — Client QA (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID_QA }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID_QA }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_QA }}

      - name: Install Bicep CLI
        run: az bicep install && az bicep version

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags Project=${{ env.PROJECT_NAME }} Environment=qa \
                   ManagedBy=damco DeployedBy=github-actions BuildId=${{ github.run_id }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/qa.bicepparam \
            --parameters sqlAdminPassword='${{ secrets.SQL_ADMIN_PASSWORD_QA }}' \
            --name "deploy-${{ env.PROJECT_NAME }}-qa-${{ github.run_id }}" \
            --mode Incremental
          echo "QA Deployment complete."

      - name: Print Outputs (incl. Static IP for DB2 whitelisting)
        run: |
          echo "=== QA Deployment Outputs ==="
          az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "deploy-${{ env.PROJECT_NAME }}-qa-${{ github.run_id }}" \
            --query properties.outputs -o table
          echo ""
          echo "NOTE: Share staticOutboundIp with client to whitelist in their on-prem firewall."

      - name: Smoke Test
        run: |
          PASS=0; FAIL=0
          BASE="${{ env.PROJECT_NAME }}-qa-${{ env.REGION_SHORT }}"
          RG="${{ env.RESOURCE_GROUP }}"

          check() {
            RESULT=$(az resource list --resource-group $RG \
              --resource-type "$2" --query "[?name=='$1'].name" -o tsv)
            if [ -z "$RESULT" ]; then echo "  FAIL: $1"; FAIL=$((FAIL+1))
            else echo "  PASS: $1"; PASS=$((PASS+1)); fi
          }

          check "vnet-${BASE}"     "Microsoft.Network/virtualNetworks"
          check "kv-${BASE}"       "Microsoft.KeyVault/vaults"
          check "asp-${BASE}"      "Microsoft.Web/serverfarms"
          check "app-${BASE}-fe"   "Microsoft.Web/sites"
          check "app-${BASE}-be"   "Microsoft.Web/sites"
          check "func-${BASE}-evb" "Microsoft.Web/sites"
          check "sql-${BASE}"      "Microsoft.Sql/servers"
          check "redis-${BASE}"    "Microsoft.Cache/redis"
          check "evhns-${BASE}"    "Microsoft.EventHub/namespaces"
          check "agw-${BASE}"      "Microsoft.Network/applicationGateways"
          check "apim-${BASE}"     "Microsoft.ApiManagement/service"
          check "natgw-${BASE}"    "Microsoft.Network/natGateways"

          echo "Results: $PASS passed, $FAIL failed"
          [ $FAIL -gt 0 ] && exit 1
          echo "All QA smoke tests passed."
